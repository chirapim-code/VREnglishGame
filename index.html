<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Air-Gesture English Game</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e293b;
            margin: 0; padding: 0;
            overflow: hidden;
            width: 100vw; height: 100vh;
        }

        /* กล้องเว็บแคมเป็นพื้นหลังเต็มหน้าจอ เห็นตัวเราเต็มๆ */
        .camera-container {
            position: absolute; top: 0; left: 0;
            width: 100vw; height: 100vh; z-index: 1;
        }
        #webcam {
            width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1);
        }
        #hand-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; transform: scaleX(-1);
        }

        /* ส่วนติดต่อผู้ใช้งาน (UI) ซ้อนทับอยู่บนกล้อง */
        .game-interface {
            position: absolute; top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 10;
            display: flex; justify-content: center; align-items: center;
            box-sizing: border-box; padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.85); /* โปร่งใสเล็กน้อยให้เห็นพื้นหลัง */
            backdrop-filter: blur(8px);
            padding: 25px; border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 100%; max-width: 650px; text-align: center;
            border: 4px solid #38bdf8;
        }
        
        /* ตัวชี้เป้าสีแดงขยับตามนิ้วชี้ในอากาศ */
        #air-pointer {
            position: fixed; width: 30px; height: 30px;
            background: rgba(239, 68, 68, 0.9); border: 4px solid white;
            border-radius: 50%; pointer-events: none; z-index: 9999;
            transform: translate(-50%, -50%); display: none;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.8);
        }

        .screen { display: none; }
        .active { display: block; }

        .word-pool, .drop-zone {
            background: rgba(248, 250, 252, 0.9); border: 3px dashed #cbd5e1;
            padding: 15px; min-height: 70px; border-radius: 16px;
            display: flex; flex-wrap: wrap; gap: 12px;
            justify-content: center; align-items: center; margin-bottom: 15px;
        }
        .drop-zone { background: rgba(240, 253, 244, 0.9); border-color: #4ade80; }
        
        /* กล่องคำศัพท์ */
        .word-block {
            background: #fef08a; border: 2px solid #facc15;
            padding: 12px 20px; border-radius: 12px;
            font-size: 18px; font-weight: bold; color: #854d0e; cursor: pointer;
            box-shadow: 0 4px 0 #facc15; transition: all 0.1s;
            user-select: none; position: relative;
        }
        /* คลาสทำงานเมื่อเอาจุดสีแดงไปค้างไว้ */
        .word-block.hovered { 
            background: #fde047 !important; 
            transform: scale(1.1); 
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.8) !important; 
        }

        button {
            background-color: #38bdf8; color: white; border: none;
            padding: 12px 35px; font-size: 20px; border-radius: 12px;
            font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #0284c7;
        }
        button.hovered { background-color: #0ea5e9 !important; transform: scale(1.05); }
        
        .status-bar { display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: bold; font-size: 18px; color: #1e293b; }
        #feedback { font-size: 20px; font-weight: bold; margin: 15px 0; min-height: 28px; }
        .leaderboard-table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; border-radius: 8px; overflow: hidden; }
        .leaderboard-table th, .leaderboard-table td { padding: 10px; border-bottom: 1px solid #e2e8f0; }
    </style>
</head>
<body>

<div id="air-pointer"></div>

<div class="camera-container">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="hand-canvas"></canvas>
</div>

<div class="game-interface">
    <div class="game-container">
        
        <div id="start-screen" class="screen active">
            <h1 style="color: #0284c7; margin-top:0;">🖐️ เกมเรียงประโยค "เอานิ้วจิ้มอากาศ"</h1>
            <p style="color: #475569; font-size:16px;">ยื่นนิ้วชี้มาที่หน้ากล้อง เลื่อนจุดสีแดงไปวางค้างไว้บนกล่องคำศัพท์ 1 วินาที เพื่อเลือกคำ!</p>
            <input type="text" id="player-name" placeholder="พิมพ์ชื่อนักเรียนตรงนี้..." style="padding:12px; text-align:center; border-radius:8px; border:2px solid #cbd5e1; width:70%; font-size:18px; margin-bottom:20px;"><br>
            <button id="btn-start" onclick="startGame()">เริ่มเล่นเกมเลย 🚀</button>
        </div>

        <div id="game-screen" class="screen">
            <div class="status-bar">
                <span id="progress-text">ข้อที่: 1/10</span>
                <span id="score-text">คะแนน: 0</span>
            </div>
            <div class="word-pool" id="word-pool"></div>
            <div class="drop-zone" id="drop-zone"></div>
            <div id="feedback"></div>
            <button id="action-btn" class="interactive-btn" onclick="checkAnswer()">ตรวจคำตอบ ✔️</button>
        </div>

        <div id="end-screen" class="screen">
            <h1 style="color: #16a34a; margin-top:0;">🏆 เก่งมาก จบเกมแล้ว! 🏆</h1>
            <h2 id="final-score-display" style="font-size:32px; color:#1e293b; margin:10px 0;">0 คะแนน</h2>
            <h3>📊 อันดับนักเรียนคนเก่ง (Top 5)</h3>
            <table class="leaderboard-table">
                <thead><tr style="background:#fef08a;"><th>อันดับ</th><th>ชื่อ</th><th>คะแนน</th></tr></thead>
                <tbody id="leaderboard-body"></tbody>
            </table><br>
            <button id="btn-restart" class="interactive-btn" onclick="location.reload()">เล่นใหม่อีกครั้ง 🔄</button>
        </div>

    </div>
</div>

<script>
    const questions = [
        { correct: ["I", "am", "a", "student."], scrambled: ["student.", "am", "I", "a"] },
        { correct: ["She", "is", "a", "doctor."], scrambled: ["is", "doctor.", "a", "She"] },
        { correct: ["They", "are", "happy."], scrambled: ["happy.", "They", "are"] },
        { correct: ["It", "is", "a", "cat."], scrambled: ["a", "cat.", "It", "is"] },
        { correct: ["We", "are", "in", "the", "classroom."], scrambled: ["classroom.", "are", "the", "We", "in"] },
        { correct: ["The", "dog", "is", "very", "big."], scrambled: ["very", "dog", "big.", "The", "is"] },
        { correct: ["You", "are", "a", "good", "boy."], scrambled: ["boy.", "good", "a", "You", "are"] },
        { correct: ["He", "likes", "to", "play", "football."], scrambled: ["play", "football.", "He", "likes", "to"] },
        { correct: ["What", "is", "your", "name?"], scrambled: ["name?", "What", "your", "is"] },
        { correct: ["This", "is", "my", "new", "pen."], scrambled: ["new", "This", "my", "pen.", "is"] }
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let playerName = "";
    let selectedWords = [];
    let poolWords = [];
    let gameActive = false;

    const videoElement = document.getElementById('webcam');
    const canvasElement = document.getElementById('hand-canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const pointerElement = document.getElementById('air-pointer');

    let hoverTarget = null;
    let hoverStartTime = 0;
    const HOVER_DURATION = 1000; // ค้างไว้ 1 วินาทีในอากาศเพื่อจิ้มคำศัพท์

    // บังคับเปิดระบบกล้องทันทีที่เปิดหน้าเว็บเว็บ
    window.onload = () => {
        initCamera();
    };

    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: "user" },
                audio: false
            });
            videoElement.srcObject = stream;
            videoElement.onloadedmetadata = () => {
                videoElement.play();
                setupMediaPipe();
            };
        } catch (err) {
            console.error("เปิดกล้องไม่ได้: ", err);
            alert("ไม่สามารถเข้าถึงกล้องเว็บแคมได้ แต่สามารถใช้การคลิก/จิ้มหน้าจอเล่นได้ครับ");
        }
    }

    function setupMediaPipe() {
        if (typeof Hands === 'undefined') return;

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults(onHandResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                try { await hands.send({ image: videoElement }); } catch(e){}
            }
        });
        camera.start().catch(e => console.log("Camera component failed", e));
    }

    function onHandResults(results) {
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const landmarks = results.multiHandLandmarks[0];
            const indexTip = landmarks[8]; // พิกัดปลายนิ้วชี้ดึงจาก AI

            // แปลงพิกัดให้เข้ากับขนาดหน้าจอจริงแบบ 1:1 เสมอ
            const screenX = indexTip.x * window.innerWidth;
            const screenY = indexTip.y * window.innerHeight;

            pointerElement.style.display = 'block';
            pointerElement.style.left = `${screenX}px`;
            pointerElement.style.top = `${screenY}px`;

            if (gameActive) {
                checkAirHover(screenX, screenY);
            }
        } else {
            pointerElement.style.display = 'none';
            cancelHover();
        }
    }

    // แก้ปัญหาพิกัดเคลื่อน: เช็กชนขอบวัตถุโดยใช้พิกัดจริงบนหน้าจอเบราว์เซอร์
    function checkAirHover(x, y) {
        // ดึงอิลิเมนต์ทั้งหมดที่มีสิทธิ์โต้ตอบในอากาศได้
        const targets = document.querySelectorAll('.word-block, .interactive-btn, #btn-start');
        let foundTarget = null;

        for (let target of targets) {
            const rect = target.getBoundingClientRect();
            // ตรวจสอบว่าพิกัดจุดแดงขยับเข้ามาอยู่ในสี่เหลี่ยมของคำศัพท์หรือไม่
            if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
                foundTarget = target;
                break;
            }
        }

        if (foundTarget) {
            if (hoverTarget !== foundTarget) {
                cancelHover();
                hoverTarget = foundTarget;
                hoverTarget.classList.add('hovered');
                hoverStartTime = Date.now();
            } else {
                if (Date.now() - hoverStartTime >= HOVER_DURATION) {
                    hoverTarget.click(); // สั่ง Click จำลองเมื่อค้างครบ 1 วินาที
                    cancelHover();
                }
            }
        } else {
            cancelHover();
        }
    }

    function cancelHover() {
        if (hoverTarget) {
            hoverTarget.classList.remove('hovered');
            hoverTarget = null;
        }
    }

    function startGame() {
        const nameInput = document.getElementById('player-name').value.trim();
        playerName = nameInput || "นักเรียนไร้นาม";
        
        document.getElementById('start-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');
        
        gameActive = true;
        loadQuestion();
    }

    function loadQuestion() {
        const q = questions[currentQuestionIndex];
        document.getElementById('progress-text').innerText = `ข้อที่: ${currentQuestionIndex + 1}/${questions.length}`;
        document.getElementById('feedback').innerText = "";
        document.getElementById('feedback').style.color = "black";
        
        poolWords = [...q.scrambled];
        selectedWords = [];
        
        renderWords();
    }

    function renderWords() {
        const poolZone = document.getElementById('word-pool');
        const dropZone = document.getElementById('drop-zone');
        
        poolZone.innerHTML = "";
        dropZone.innerHTML = "";

        poolWords.forEach((word, index) => {
            const block = document.createElement('div');
            block.className = 'word-block';
            block.innerText = word;
            block.onclick = () => moveWord(index, 'select');
            poolZone.appendChild(block);
        });

        selectedWords.forEach((word, index) => {
            const block = document.createElement('div');
            block.className = 'word-block';
            block.style.background = '#bbf7d0';
            block.style.borderColor = '#4ade80';
            block.style.color = '#166534';
            block.innerText = word;
            block.onclick = () => moveWord(index, 'deselect');
            dropZone.appendChild(block);
        });
    }

    function moveWord(index, action) {
        if (action === 'select') {
            const word = poolWords.splice(index, 1)[0];
            selectedWords.push(word);
        } else {
            const word = selectedWords.splice(index, 1)[0];
            poolWords.push(word);
        }
        renderWords();
    }

    function checkAnswer() {
        const q = questions[currentQuestionIndex];
        const isCorrect = JSON.stringify(selectedWords) === JSON.stringify(q.correct);
        const feedback = document.getElementById('feedback');

        if (isCorrect) {
            score += 10;
            feedback.innerText = "🎉 ถูกต้องยอดเยี่ยม! (+10 คะแนน)";
            feedback.style.color = "#16a34a";
            document.getElementById('score-text').innerText = `คะแนน: ${score}`;
            
            setTimeout(() => {
                currentQuestionIndex++;
                if (currentQuestionIndex < questions.length) {
                    loadQuestion();
                } else {
                    endGame();
                }
            }, 1500);
        } else {
            feedback.innerText = "❌ ยังไม่ถูกนะจ๊ะ ลองเรียงใหม่อีกที!";
            feedback.style.color = "#dc2626";
        }
    }

    function endGame() {
        gameActive = false;
        document.getElementById('game-screen').classList.remove('active');
        document.getElementById('end-screen').classList.add('active');
        document.getElementById('final-score-display').innerText = `${score} คะแนน`;

        let leaderboard = JSON.parse(localStorage.getItem('english_leaderboard')) || [];
        leaderboard.push({ name: playerName, score: score });
        leaderboard.sort((a, b) => b.score - a.score);
        leaderboard = leaderboard.slice(0, 5);
        localStorage.setItem('english_leaderboard', JSON.stringify(leaderboard));

        const tbody = document.getElementById('leaderboard-body');
        tbody.innerHTML = "";
        leaderboard.forEach((entry, idx) => {
            tbody.innerHTML += `<tr><td>${idx + 1}</td><td>${entry.name}</td><td>${entry.score}</td></tr>`;
        });
    }
</script>

</body>
</html>
